const storeData = window.STREAMLINE_STORE_DATA || { groups: [], allItems: [], featured: [], storeCount: 0 };

const qs = (selector, scope = document) => scope.querySelector(selector);
const qsa = (selector, scope = document) => [...scope.querySelectorAll(selector)];

const state = {
  query: "",
  group: "all",
};

const money = (value) => `$${Number(value || 0).toLocaleString()}`;

function initials(name) {
  return name
    .split(/\s+/)
    .filter(Boolean)
    .slice(0, 2)
    .map((part) => part[0])
    .join("")
    .toUpperCase();
}

function hostLabel(url) {
  try {
    const path = new URL(url).pathname.replace(/^\/|\/shop\/home$/g, "");
    return path || "Open store";
  } catch {
    return "Open store";
  }
}

function showToast(message) {
  const toast = qs("[data-toast]");
  if (!toast) return;
  toast.textContent = message;
  toast.hidden = false;
  clearTimeout(showToast.timer);
  showToast.timer = setTimeout(() => {
    toast.hidden = true;
  }, 3600);
}

function renderFilter() {
  const filter = qs("[data-group-filter]");
  if (!filter) return;

  const buttons = [
    { id: "all", label: "All stores" },
    ...storeData.groups.map((group) => ({ id: group.group, label: group.group })),
  ];

  filter.innerHTML = buttons.map((button) => `
    <button class="filter-chip ${button.id === state.group ? "active" : ""}" type="button" data-group="${button.id}">
      ${button.label}
    </button>
  `).join("");

  qsa("[data-group]", filter).forEach((button) => {
    button.addEventListener("click", () => {
      state.group = button.dataset.group;
      renderStores();
      renderFilter();
    });
  });
}

function createStoreCard(item) {
  const card = document.createElement("a");
  card.className = "store-card";
  card.href = item.url;
  card.target = "_blank";
  card.rel = "noreferrer";
  card.innerHTML = `
    <span class="store-logo">
      <img src="${item.logo}" alt="" loading="lazy">
      <span class="store-initials">${initials(item.name)}</span>
    </span>
    <span>
      <span class="store-name">${item.name}</span>
      <span class="store-url">${hostLabel(item.url)}</span>
    </span>
  `;
  const image = qs("img", card);
  image.addEventListener("error", () => card.classList.add("logo-error"), { once: true });
  return card;
}

function groupMatches(group) {
  if (state.group !== "all" && group.group !== state.group) return [];
  const tokens = state.query.trim().toLowerCase().split(/\s+/).filter(Boolean);
  if (!tokens.length) return group.items;
  return group.items.filter((item) => {
    const haystack = [item.name, group.group, item.url].join(" ").toLowerCase();
    return tokens.every((token) => haystack.includes(token));
  });
}

function renderStores() {
  const directory = qs("[data-store-directory]");
  const empty = qs("[data-empty-stores]");
  if (!directory) return;

  directory.innerHTML = "";
  let visibleCount = 0;

  storeData.groups.forEach((group, index) => {
    const matches = groupMatches(group);
    if (!matches.length) return;
    visibleCount += matches.length;

    const details = document.createElement("details");
    details.className = "store-group";
    details.open = index < 5 || Boolean(state.query);

    const summary = document.createElement("summary");
    summary.innerHTML = `
      <span class="group-dot"></span>
      <span>
        <span class="store-group-name">${group.group}</span>
        <span class="store-group-count">${matches.length} linked ${matches.length === 1 ? "store" : "stores"}</span>
      </span>
    `;

    const grid = document.createElement("div");
    grid.className = "store-grid";
    matches.forEach((item) => grid.append(createStoreCard(item)));

    details.append(summary, grid);
    directory.append(details);
  });

  if (empty) empty.hidden = visibleCount > 0;
}

function renderFeaturedStores() {
  const strip = qs("[data-featured-stores]");
  if (!strip) return;

  const featured = storeData.featured.length ? storeData.featured : storeData.allItems.slice(0, 16);
  strip.innerHTML = "";
  featured.slice(0, 18).forEach((item) => {
    const link = document.createElement("a");
    link.className = "featured-store";
    link.href = item.url;
    link.target = "_blank";
    link.rel = "noreferrer";
    link.title = item.name;
    link.innerHTML = `<img src="${item.logo}" alt="${item.name} logo" loading="lazy">`;
    strip.append(link);
  });
}

function setupStores() {
  qsa("[data-store-count]").forEach((el) => {
    el.textContent = storeData.storeCount || storeData.allItems.length;
  });
  renderFeaturedStores();
  renderFilter();
  renderStores();

  const search = qs("[data-store-search]");
  if (search) {
    search.addEventListener("input", () => {
      state.query = search.value;
      renderStores();
    });
  }
}

function setupNavigation() {
  const header = qs("[data-header]");
  const menu = qs("[data-menu]");
  const toggle = qs("[data-menu-toggle]");
  const links = qsa(".site-menu a");

  const setHeader = () => header?.classList.toggle("is-scrolled", window.scrollY > 16);
  setHeader();
  window.addEventListener("scroll", setHeader, { passive: true });

  toggle?.addEventListener("click", () => {
    const open = !menu.classList.contains("is-open");
    menu.classList.toggle("is-open", open);
    toggle.setAttribute("aria-expanded", String(open));
  });

  links.forEach((link) => {
    link.addEventListener("click", () => {
      menu?.classList.remove("is-open");
      toggle?.setAttribute("aria-expanded", "false");
    });
  });

  const sections = links
    .map((link) => document.querySelector(link.getAttribute("href")))
    .filter(Boolean);

  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (!entry.isIntersecting) return;
      links.forEach((link) => {
        link.classList.toggle("active", link.getAttribute("href") === `#${entry.target.id}`);
      });
    });
  }, { rootMargin: "-30% 0px -60% 0px", threshold: 0.01 });

  sections.forEach((section) => observer.observe(section));
}

function setupTicker() {
  const ticker = qs("[data-ticker]");
  const workTrack = qs("[data-work-track]");
  if (ticker) ticker.innerHTML += ticker.innerHTML;
  if (workTrack) workTrack.innerHTML += workTrack.innerHTML;
}

function setupReveal() {
  const revealTargets = qsa(".service-card, .service-detail, .equipment-card, .store-group, .form-card, .value-card, .contact-card, .map-card, .order-sidecard, .workflow-step, .instagram-callout, .work-feature, .team-header, .team-card");
  revealTargets.forEach((target) => target.classList.add("reveal"));
  const observer = new IntersectionObserver((entries) => {
    entries.forEach((entry) => {
      if (entry.isIntersecting) entry.target.classList.add("is-visible");
    });
  }, { threshold: 0.14 });
  revealTargets.forEach((target) => observer.observe(target));
}

function setupProofSlider() {
  qsa("[data-proof-slider]").forEach((input) => {
    const wrap = input.closest("[data-proof-slider-wrap]");
    const update = () => {
      if (wrap) wrap.style.setProperty("--split", `${input.value}%`);
    };
    input.addEventListener("input", update);
    update();
  });
}

function activateOrderTab(tab) {
  const buttons = qsa("[data-tab]");
  const panels = qsa("[data-panel]");
  const sidecards = qsa("[data-order-sidecard]");

  buttons.forEach((button) => {
    const active = button.dataset.tab === tab;
    button.classList.toggle("active", active);
    button.setAttribute("aria-selected", String(active));
  });

  panels.forEach((panel) => panel.classList.toggle("active", panel.dataset.panel === tab));
  sidecards.forEach((card) => {
    card.hidden = card.dataset.orderSidecard !== tab;
  });
}

function setupTabs() {
  const buttons = qsa("[data-tab]");

  buttons.forEach((button) => {
    button.addEventListener("click", () => activateOrderTab(button.dataset.tab));
  });

  qsa("[data-open-order]").forEach((trigger) => {
    trigger.addEventListener("click", (event) => {
      const tab = trigger.dataset.openOrder;
      if (!tab) return;
      event.preventDefault();
      activateOrderTab(tab);
      qs("#order")?.scrollIntoView({ behavior: "smooth", block: "start" });
    });
  });

  activateOrderTab("custom");
}

function selectedPrice(selector) {
  const input = qs(selector);
  const option = input?.selectedOptions?.[0];
  return Number(option?.dataset.price || 0);
}

function updateEstimate() {
  const qty = selectedPrice("[data-price-field='quantity']");
  const size = selectedPrice("[data-price-field='size']");
  const finish = selectedPrice("[data-price-field='finish']");
  const cut = selectedPrice("[data-price-field='cut']");
  const art = qs("[data-art-help]")?.checked ? 35 : 0;
  const total = qty + size + finish + cut + art;

  const set = (selector, value) => {
    const target = qs(selector);
    if (target) target.textContent = money(value);
  };

  set("[data-estimate-total]", total);
  set("[data-estimate-qty]", qty);
  set("[data-estimate-size]", size + cut);
  set("[data-estimate-finish]", finish);
  set("[data-estimate-art]", art);
}

function setupOrderForms() {
  qsa("[data-price-field], [data-art-help]").forEach((field) => {
    field.addEventListener("change", updateEstimate);
  });
  updateEstimate();

  qsa(".order-form").forEach((form) => {
    form.addEventListener("submit", (event) => {
      event.preventDefault();
      const label = form.dataset.panel === "stickers" ? "Sticker order" : "Custom order";
      showToast(`${label} received. Streamline will review the details and follow up with next steps.`);
      form.reset();
      qsa("[data-file-preview]", form).forEach((preview) => {
        preview.innerHTML = "";
        preview.hidden = true;
      });
      updateEstimate();
    });
  });
}

function setupFileUpload() {
  qsa("[data-dropzone]").forEach((dropzone) => {
    const input = qs("[data-file-input]", dropzone);
    const preview = dropzone.parentElement?.querySelector("[data-file-preview]");

    const showFile = (file) => {
      if (!file || !preview) return;
      preview.hidden = false;
      const imageMarkup = file.type.startsWith("image/")
        ? `<img src="${URL.createObjectURL(file)}" alt="">`
        : `<span class="file-chip">${file.name.split(".").pop().toUpperCase()}</span>`;
      preview.innerHTML = `
        ${imageMarkup}
        <div>
          <strong>${file.name}</strong>
          <p>${Math.ceil(file.size / 1024).toLocaleString()} KB uploaded for review</p>
        </div>
      `;
    };

    input?.addEventListener("change", () => showFile(input.files?.[0]));

    ["dragenter", "dragover"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.add("is-dragover");
      });
    });

    ["dragleave", "drop"].forEach((eventName) => {
      dropzone.addEventListener(eventName, (event) => {
        event.preventDefault();
        dropzone.classList.remove("is-dragover");
      });
    });

    dropzone.addEventListener("drop", (event) => {
      const file = event.dataTransfer?.files?.[0];
      if (file) showFile(file);
    });
  });
}

function setupContactForm() {
  qs("[data-contact-form]")?.addEventListener("submit", (event) => {
    event.preventDefault();
    showToast("Message received. Streamline will follow up shortly.");
    event.currentTarget.reset();
  });
}

function setupFooter() {
  const year = qs("[data-year]");
  if (year) year.textContent = new Date().getFullYear();
}

function setupServiceModal() {
  const backdrop = qs("#service-modal-backdrop");
  const content = qs("#service-modal-content");
  const closeBtn = qs("[data-service-modal-close]");
  if (!backdrop || !content) return;

  const close = () => {
    if (backdrop.hidden || backdrop.classList.contains("is-closing")) return;
    backdrop.classList.add("is-closing");
    document.body.style.overflow = "";
    setTimeout(() => {
      backdrop.hidden = true;
      backdrop.classList.remove("is-closing");
    }, 240);
  };

  closeBtn?.addEventListener("click", close);
  backdrop.addEventListener("click", (event) => {
    if (event.target === backdrop) close();
  });
  window.addEventListener("keydown", (event) => {
    if (event.key === "Escape" && !backdrop.hidden) close();
  });

  qsa(".service-grid .service-card").forEach((card) => {
    card.addEventListener("click", (event) => {
      const targetId = card.getAttribute("href");
      if (!targetId || !targetId.startsWith("#service-")) return;
      event.preventDefault();
      const template = qs(targetId);
      if (!template) return;

      const cloned = template.cloneNode(true);
      cloned.classList.remove("reveal");
      cloned.classList.add("is-visible");
      qsa(".reveal", cloned).forEach((el) => {
        el.classList.remove("reveal");
        el.classList.add("is-visible");
      });

      content.replaceChildren(cloned);
      backdrop.classList.remove("is-closing");
      backdrop.hidden = false;
      document.body.style.overflow = "hidden";
    });
  });
}

document.addEventListener("DOMContentLoaded", () => {
  setupFooter();
  setupTicker();
  setupNavigation();
  setupStores();
  setupTabs();
  setupOrderForms();
  setupFileUpload();
  setupContactForm();
  setupProofSlider();
  setupReveal();
  setupServiceModal();
});

      const desc = document.createElement("p");
      desc.textContent = "Enter shop staff password to edit content.";
      desc.style.cssText = "margin: 0; font-size: 0.95rem; color: var(--muted);";

      const input = document.createElement("input");
      input.type = "password";
      input.placeholder = "Password (default: streamline-2026)";
      input.style.cssText = "padding: 12px 16px; border: 1px solid var(--line); border-radius: 8px; font-size: 1rem; width: 100%; box-sizing: border-box;";

      const errorMsg = document.createElement("span");
      errorMsg.style.cssText = "color: var(--red); font-size: 0.85rem; display: none;";
      errorMsg.textContent = "Invalid password. Please try again.";

      const btnRow = document.createElement("div");
      btnRow.style.cssText = "display: flex; gap: 12px; margin-top: 8px;";

      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.className = "button quiet";
      cancelBtn.textContent = "Cancel";
      cancelBtn.style.cssText = "flex: 1; padding: 12px; border-radius: 999px; cursor: pointer;";

      const submitBtn = document.createElement("button");
      submitBtn.type = "submit";
      submitBtn.className = "button primary";
      submitBtn.textContent = "Login";
      submitBtn.style.cssText = "flex: 1; padding: 12px; border-radius: 999px; cursor: pointer;";

      cancelBtn.addEventListener("click", () => {
        backdrop.style.display = "none";
        input.value = "";
        errorMsg.style.display = "none";
      });

      const handleLogin = async () => {
        const pass = input.value.trim();
        const hashed = await hashPassword(pass);
        const expected = await hashPassword(DEFAULT_PASS);

        if (hashed === expected) {
          isAdminAuthenticated = true;
          backdrop.style.display = "none";
          input.value = "";
          errorMsg.style.display = "none";
          createControlBar();
          toggleEditMode(true);
          updateAdminBtnState();
        } else {
          errorMsg.style.display = "block";
          input.value = "";
        }
      };

      submitBtn.addEventListener("click", handleLogin);
      input.addEventListener("keydown", (e) => {
        if (e.key === "Enter") handleLogin();
      });

      btnRow.appendChild(cancelBtn);
      btnRow.appendChild(submitBtn);

      card.appendChild(title);
      card.appendChild(desc);
      card.appendChild(input);
      card.appendChild(errorMsg);
      card.appendChild(btnRow);
      backdrop.appendChild(card);
      document.body.appendChild(backdrop);
    }
    backdrop.style.display = "grid";
    const passField = backdrop.querySelector("input[type='password']");
    if (passField) passField.focus();
  }

  function updateAdminBtnState() {
    const btn = document.querySelector(".admin-toggle-btn");
    if (!btn) return;
    if (isAdminAuthenticated) {
      btn.style.background = "var(--yellow)";
      btn.style.color = "var(--ink)";
      btn.style.borderColor = "var(--yellow)";
      btn.style.fontWeight = "900";
      btn.textContent = "⚙️ Admin Active";
    } else {
      btn.style.background = "rgba(255, 255, 255, 0.05)";
      btn.style.color = "rgba(255, 255, 255, 0.72)";
      btn.style.borderColor = "rgba(255, 255, 255, 0.18)";
      btn.style.fontWeight = "normal";
      btn.textContent = "⚙️ Admin";
    }
  }

  function createControlBar() {
    let bar = document.getElementById("admin-control-bar");
    if (bar) return;

    bar = document.createElement("div");
    bar.id = "admin-control-bar";
    bar.style.cssText = "position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--navy); color: var(--white); padding: 14px 24px; border-radius: 999px; box-shadow: 0 16px 40px rgba(0,0,0,0.5); z-index: 999999; display: flex; align-items: center; gap: 16px; border: 1px solid rgba(255,255,255,0.2); max-width: 90vw;";

    const status = document.createElement("span");
    status.style.cssText = "font-weight: 800; font-size: 0.9rem; display: flex; align-items: center; gap: 8px;";
    status.textContent = "🟢 Admin Mode Active — Click any text or image to edit";

    const btnGroup = document.createElement("div");
    btnGroup.style.cssText = "display: flex; gap: 8px;";

    const saveBtn = document.createElement("button");
    saveBtn.type = "button";
    saveBtn.className = "button";
    saveBtn.textContent = "💾 Save Changes";
    saveBtn.style.cssText = "padding: 8px 16px; font-size: 0.85rem; border-radius: 999px; background: var(--yellow); color: var(--ink); font-weight: 900; border: none; cursor: pointer;";

    const publishBtn = document.createElement("button");
    publishBtn.type = "button";
    publishBtn.className = "button";
    publishBtn.textContent = "🚀 Export & Publish";
    publishBtn.style.cssText = "padding: 8px 16px; font-size: 0.85rem; border-radius: 999px; background: var(--red); color: var(--white); font-weight: 900; border: none; cursor: pointer;";

    const logoutBtn = document.createElement("button");
    logoutBtn.type = "button";
    logoutBtn.className = "button quiet";
    logoutBtn.textContent = "Logout";
    logoutBtn.style.cssText = "padding: 8px 14px; font-size: 0.85rem; border-radius: 999px; color: rgba(255,255,255,0.7); background: transparent; border: 1px solid rgba(255,255,255,0.2); cursor: pointer;";

    saveBtn.addEventListener("click", () => {
      try {
        localStorage.setItem("streamline_admin_overrides", JSON.stringify(editedOverrides));
        saveBtn.textContent = "✅ Saved Locally!";
        setTimeout(() => { saveBtn.textContent = "💾 Save Changes"; }, 2000);
      } catch (e) {
        alert("Failed to save changes.");
      }
    });

    publishBtn.addEventListener("click", () => {
      exportPublishedSite();
    });

    logoutBtn.addEventListener("click", () => {
      isAdminAuthenticated = false;
      toggleEditMode(false);
      bar.style.display = "none";
      updateAdminBtnState();
    });

    btnGroup.appendChild(saveBtn);
    btnGroup.appendChild(publishBtn);
    btnGroup.appendChild(logoutBtn);

    bar.appendChild(status);
    bar.appendChild(btnGroup);
    document.body.appendChild(bar);
  }

  function toggleEditMode(enable) {
    isEditModeActive = enable;
    const bar = document.getElementById("admin-control-bar");
    if (bar) bar.style.display = enable ? "flex" : "none";

    document.querySelectorAll("[data-admin-key]").forEach((el) => {
      if (enable) {
        el.classList.add("admin-editable-hover");
        el.addEventListener("click", handleElementClick, { capture: true });
      } else {
        el.classList.remove("admin-editable-hover");
        el.removeEventListener("click", handleElementClick, { capture: true });
      }
    });
  }

  function handleElementClick(e) {
    if (!isEditModeActive || !isAdminAuthenticated) return;
    e.preventDefault();
    e.stopPropagation();
    openEditModal(e.currentTarget);
  }

  function openEditModal(el) {
    const key = el.getAttribute("data-admin-key");
    if (!key) return;

    let backdrop = document.querySelector(".admin-edit-backdrop");
    if (!backdrop) {
      backdrop = document.createElement("div");
      backdrop.className = "admin-edit-backdrop";
      backdrop.style.cssText = "position: fixed; inset: 0; background: rgba(16, 41, 64, 0.65); backdrop-filter: blur(8px); z-index: 1000001; display: grid; place-items: center; padding: 20px;";
      document.body.appendChild(backdrop);
    }
    backdrop.replaceChildren(); // Safe clearing

    const card = document.createElement("div");
    card.style.cssText = "background: var(--white); border-radius: 16px; padding: 32px; width: min(500px, 100%); box-shadow: 0 20px 50px rgba(0,0,0,0.4); display: flex; flex-direction: column; gap: 16px;";

    const title = document.createElement("h3");
    title.textContent = el.tagName.toLowerCase() === "img" ? "Edit Image Element" : "Edit Text Content";
    title.style.cssText = "margin: 0; font-size: 1.35rem; color: var(--navy);";

    card.appendChild(title);

    if (el.tagName.toLowerCase() === "img") {
      const srcLabel = document.createElement("label");
      srcLabel.style.cssText = "display: flex; flex-direction: column; gap: 6px; font-size: 0.9rem; font-weight: 700; color: var(--ink);";
      srcLabel.textContent = "Image URL / Path:";
      const srcInput = document.createElement("input");
      srcInput.type = "text";
      srcInput.value = el.getAttribute("src") || "";
      srcInput.style.cssText = "padding: 10px 14px; border: 1px solid var(--line); border-radius: 8px; font-size: 0.95rem; width: 100%;";
      srcLabel.appendChild(srcInput);

      const altLabel = document.createElement("label");
      altLabel.style.cssText = "display: flex; flex-direction: column; gap: 6px; font-size: 0.9rem; font-weight: 700; color: var(--ink);";
      altLabel.textContent = "Alt Description:";
      const altInput = document.createElement("input");
      altInput.type = "text";
      altInput.value = el.getAttribute("alt") || "";
      altInput.style.cssText = "padding: 10px 14px; border: 1px solid var(--line); border-radius: 8px; font-size: 0.95rem; width: 100%;";
      altLabel.appendChild(altInput);

      card.appendChild(srcLabel);
      card.appendChild(altLabel);

      const btnRow = document.createElement("div");
      btnRow.style.cssText = "display: flex; gap: 12px; margin-top: 10px;";

      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.className = "button quiet";
      cancelBtn.textContent = "Cancel";
      cancelBtn.style.cssText = "flex: 1; padding: 12px; border-radius: 999px; cursor: pointer;";
      cancelBtn.addEventListener("click", () => { backdrop.style.display = "none"; });

      const applyBtn = document.createElement("button");
      applyBtn.type = "button";
      applyBtn.className = "button primary";
      applyBtn.textContent = "Apply Image Change";
      applyBtn.style.cssText = "flex: 1; padding: 12px; border-radius: 999px; cursor: pointer;";
      applyBtn.addEventListener("click", () => {
        const newSrc = srcInput.value.trim();
        const newAlt = altInput.value.trim();
        if (newSrc) {
          el.setAttribute("src", newSrc);
          el.setAttribute("alt", newAlt);
          editedOverrides[key] = { type: "image", src: newSrc, alt: newAlt };
        }
        backdrop.style.display = "none";
      });

      btnRow.appendChild(cancelBtn);
      btnRow.appendChild(applyBtn);
      card.appendChild(btnRow);
    } else {
      const textLabel = document.createElement("label");
      textLabel.style.cssText = "display: flex; flex-direction: column; gap: 6px; font-size: 0.9rem; font-weight: 700; color: var(--ink);";
      textLabel.textContent = "Text Content:";
      const textArea = document.createElement("textarea");
      textArea.rows = 4;
      textArea.value = el.textContent || "";
      textArea.style.cssText = "padding: 12px 14px; border: 1px solid var(--line); border-radius: 8px; font-size: 0.95rem; width: 100%; font-family: inherit; line-height: 1.5; resize: vertical;";
      textLabel.appendChild(textArea);
      card.appendChild(textLabel);

      const btnRow = document.createElement("div");
      btnRow.style.cssText = "display: flex; gap: 12px; margin-top: 10px;";

      const cancelBtn = document.createElement("button");
      cancelBtn.type = "button";
      cancelBtn.className = "button quiet";
      cancelBtn.textContent = "Cancel";
      cancelBtn.style.cssText = "flex: 1; padding: 12px; border-radius: 999px; cursor: pointer;";
      cancelBtn.addEventListener("click", () => { backdrop.style.display = "none"; });

      const applyBtn = document.createElement("button");
      applyBtn.type = "button";
      applyBtn.className = "button primary";
      applyBtn.textContent = "Apply Text Change";
      applyBtn.style.cssText = "flex: 1; padding: 12px; border-radius: 999px; cursor: pointer;";
      applyBtn.addEventListener("click", () => {
        const newText = textArea.value.trim();
        el.textContent = newText;
        editedOverrides[key] = { type: "text", content: newText };
        backdrop.style.display = "none";
      });

      btnRow.appendChild(cancelBtn);
      btnRow.appendChild(applyBtn);
      card.appendChild(btnRow);
    }

    backdrop.style.display = "grid";
    backdrop.appendChild(card);
  }

  function exportPublishedSite() {
    // We clone the document documentElement, apply current content, and generate downloadable html patch
    const htmlClone = document.documentElement.cloneNode(true);
    // Clean up admin modals and scripts from the exported clone if needed, but keeping data-admin-key allows future edits
    const adminBar = htmlClone.querySelector("#admin-control-bar");
    if (adminBar) adminBar.remove();
    const adminModals = htmlClone.querySelectorAll(".admin-modal-backdrop, .admin-edit-backdrop");
    adminModals.forEach((m) => m.remove());

    const htmlContent = "<!DOCTYPE html>\n" + htmlClone.outerHTML;
    const blob = new Blob([htmlContent], { type: "text/html" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "index.html";
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  // Inject CSS rules for admin editable highlights
  function injectAdminStyles() {
    const style = document.createElement("style");
    style.textContent = `
      .admin-editable-hover {
        transition: outline 0.2s ease, background 0.2s ease;
      }
      .admin-editable-hover:hover {
        outline: 2px dashed var(--red) !important;
        outline-offset: 4px;
        cursor: pointer !important;
        background: rgba(231, 71, 47, 0.05) !important;
      }
    `;
    document.head.appendChild(style);
  }

  document.addEventListener("DOMContentLoaded", () => {
    injectAdminStyles();
    tagEditableElements();
    loadSavedOverrides();
    createAdminButton();
  });
})();

// Google Apps Script Integration for form submission
document.addEventListener("DOMContentLoaded", () => {
  document.querySelectorAll(".order-form").forEach(form => {
    form.addEventListener("submit", (e) => {
      // app.js already prevents default, but we'll capture data here
      if (typeof google === 'undefined' || !google.script) return; // Only run if in GAS environment

      const formData = new FormData(form);
      const data = Object.fromEntries(formData.entries());
      
      if (form.dataset.panel === 'custom') {
        data.methods = formData.getAll('method');
        google.script.run.withSuccessHandler(() => console.log('Custom order saved to sheet')).submitCustomOrder(data);
      } else if (form.dataset.panel === 'stickers') {
        // Need to check the art-help checkbox manually since FormData might omit it if unchecked
        const artHelpCheckbox = form.querySelector('[data-art-help]');
        if (artHelpCheckbox) {
          data['art-help'] = artHelpCheckbox.checked;
        }
        google.script.run.withSuccessHandler(() => console.log('Sticker order saved to sheet')).submitStickerOrder(data);
      }
    });
  });

  const contactForm = document.querySelector("[data-contact-form]");
  if (contactForm) {
    contactForm.addEventListener("submit", (e) => {
      if (typeof google === 'undefined' || !google.script) return;
      const inputs = contactForm.querySelectorAll("input, textarea");
      const data = {
        name: inputs[0].value,
        email: inputs[1].value,
        message: inputs[2].value
      };
      google.script.run.withSuccessHandler(() => console.log('Message saved to sheet')).submitContactMessage(data);
    });
  }
});
</script>
